name: PHP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: php-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: cogwork_test
          MARIADB_USER: cogwork
          MARIADB_PASSWORD: test-only-password
          MARIADB_ROOT_PASSWORD: test-only-root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=2s --health-timeout=3s --health-retries=30
    env:
      COGWORK_TEST_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=cogwork_test;charset=utf8mb4
      COGWORK_TEST_MYSQL_USER: cogwork
      COGWORK_TEST_MYSQL_PASSWORD: test-only-password

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, mbstring, openssl, pdo, pdo_mysql, pdo_sqlite, zip
          coverage: none
          tools: composer:v2

      - name: Validate Composer files
        run: composer validate --strict

      - name: Install development dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Audit locked dependencies
        run: composer audit --locked

      - name: Check PHP syntax
        run: find app lang tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run test suite
        run: composer test

  browser:
    name: Browser smoke (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring, openssl, pdo, pdo_sqlite, zip
          coverage: none
      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: Install browser test dependencies
        run: npm install --no-audit --no-fund && npx playwright install --with-deps ${{ matrix.browser }}
      - name: Start clean application server
        run: |
          rm -f storage/installed.lock storage/config.php storage/data/modright.sqlite
          php -S 127.0.0.1:8090 > /tmp/cogwork-e2e-server.log 2>&1 &
          for attempt in {1..30}; do curl -fsS http://127.0.0.1:8090/index.php >/dev/null && exit 0; sleep 1; done
          cat /tmp/cogwork-e2e-server.log
          exit 1
      - name: Run browser smoke test
        run: npx playwright test --project=${{ matrix.browser }}
      - name: Upload browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-${{ matrix.browser }}-artifacts
          path: |
            playwright-report/
            test-results/
            /tmp/cogwork-e2e-server.log
          if-no-files-found: ignore
          retention-days: 14
