name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: Test and package ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out tagged source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring, openssl, pdo, pdo_sqlite, zip
          coverage: none
          tools: composer:v2

      - name: Validate and install development dependencies
        run: |
          composer validate --strict
          composer install --prefer-dist --no-interaction --no-progress

      - name: Audit dependencies
        run: composer audit --locked

      - name: Check PHP syntax
        run: find app lang tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run test suite
        run: composer test

      - name: Check tag and application version
        run: test "${GITHUB_REF_NAME#v}" = "$(tr -d '[:space:]' < VERSION)"

      - name: Build shared-hosting archive
        run: bash scripts/build-release.sh "$GITHUB_REF_NAME"

      - name: Verify release archive
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/cogwork-engine-${GITHUB_REF_NAME#v}.zip"
          unzip -t "$archive"
          entries=$(unzip -Z1 "$archive")
          if grep -Eq '(^|/)(\.git|\.github|tests|vendor|config/config\.php|storage/config\.php|composer\.(json|lock)|phpunit\.xml|compose\.ya?ml)(/|$)' <<< "$entries"; then
            printf '%s\n' 'Release contains a forbidden development or runtime path.' >&2
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease=()
          if [[ "$GITHUB_REF_NAME" == v0.* || "$GITHUB_REF_NAME" == *-* ]]; then
            prerelease=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            dist/cogwork-engine-*.zip \
            dist/cogwork-engine-*.zip.sha256 \
            --verify-tag \
            --title "Cogwork Engine $GITHUB_REF_NAME" \
            --generate-notes \
            --notes "See the packaged CHANGELOG and project wiki for upgrade and deployment guidance." \
            "${prerelease[@]}"
